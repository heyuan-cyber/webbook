name = "webbook-api"
main = "src/index.ts"
compatibility_date = "2024-10-01"

# 通过 `wrangler secret put <NAME>` 设置以下机密（不要写入此文件）：
#   GITHUB_TOKEN, AI_API_KEY, SUPABASE_SERVICE_ROLE_KEY, SEARCH_API_KEY
[vars]
GITHUB_REPO = "heyuan-cyber/webbook-data"
GITHUB_BRANCH = "main"
AI_PROVIDER = "deepseek"
AI_BASE_URL = "https://api.deepseek.com"
AI_MODEL = "deepseek-v4-flash"
SUPABASE_URL = "https://sfetitwfmnutiweqyfnq.supabase.co"
# 联网简报：国内 RSS 为主，国际为辅（逗号分隔）
RSS_FEEDS_DOMESTIC = "https://www.ithome.com/rss/,https://www.solidot.org/index.rss,https://feeds.feedburner.com/sspai"
RSS_FEEDS_INTERNATIONAL = "https://hnrss.org/frontpage,http://feeds.bbci.co.uk/zhongwen/simp/rss.xml"
DOMESTIC_NEWS_RATIO = "0.7"
# 国内搜索默认博查，国际默认 Tavily；secret: SEARCH_API_KEY 或分设 DOMESTIC/INTERNATIONAL
SEARCH_PROVIDER_DOMESTIC = "bocha"
SEARCH_PROVIDER_INTERNATIONAL = "tavily"

# 每晚定时整理（cron 策略）
[triggers]
crons = ["0 18 * * *"]
