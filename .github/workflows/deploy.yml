name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # 项目站点部署在 /<repo>/ 子路径
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Supabase anon key 本就暴露在前端 bundle，可安全内联；API URL 部署 Workers 后更新
          VITE_API_BASE_URL: https://webbook-api.heyuan-webbook.workers.dev
          VITE_SUPABASE_URL: https://sfetitwfmnutiweqyfnq.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmZXRpdHdmbW51dGl3ZXF5Zm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjQzMzMsImV4cCI6MjA5NjkwMDMzM30.UYfQSLI6Y092yPOabxgo-uqak9rk_r-tlNGQAlbpLWU
          VITE_ADMIN_EMAIL: 1060707057@qq.com
        run: npm run build
      - name: SPA fallback (404 + /app path for TWA)
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          mkdir -p apps/web/dist/app
          cp apps/web/dist/index.html apps/web/dist/app/index.html
          touch apps/web/dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
