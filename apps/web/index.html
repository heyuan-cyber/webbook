<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WebBook · 个人知识库</title>
  </head>
  <body>
    <script>
      (function () {
        var shell =
          document.referrer.indexOf('android-app://') === 0 ||
          (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
          /[?&]shell=/.test(location.search) ||
          (/Android/i.test(navigator.userAgent) && /; wv\)/.test(navigator.userAgent));
        if (!shell || !('serviceWorker' in navigator)) return;
        if (navigator.serviceWorker.controller && !/[?&]_reload=1/.test(location.search)) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(
              regs.map(function (r) {
                return r.unregister();
              }),
            );
          }).then(function () {
            if ('caches' in window) {
              return caches.keys().then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k);
                  }),
                );
              });
            }
          }).then(function () {
            var u = new URL(location.href);
            u.searchParams.set('_reload', '1');
            location.replace(u.toString());
          });
          return;
        }
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) {
            r.unregister();
          });
        });
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) {
              caches.delete(k);
            });
          });
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
